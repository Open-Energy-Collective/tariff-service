AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: OEC Tariff Data Service

Parameters:
  JwtSecretParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /oec/tariff-service/jwt-secret
    Description: SSM parameter name containing the JWT secret
    NoEcho: true

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 256
    Environment:
      Variables:
        ENV: production
        JWT_SECRET: !Ref JwtSecretParam

Resources:
  TariffFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: ..
      Architectures:
        - x86_64
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref TariffApi

  TariffApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
        AllowHeaders:
          - "*"

  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: api.openenergy.org.au
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref ApiCertificate

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref TariffApi
      DomainName: !Ref ApiDomainName
      Stage: prod

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: api.openenergy.org.au
      SubjectAlternativeNames:
        - "*.openenergy.org.au"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: api.openenergy.org.au
          HostedZoneId: Z0814724GW41ZONERIE9
        - DomainName: "*.openenergy.org.au"
          HostedZoneId: Z0814724GW41ZONERIE9

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: TariffService-5xx-Errors
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiId
          Value: !Ref TariffApi

Outputs:
  ApiUrl:
    Description: API endpoint URL
    Value: !Sub "https://${TariffApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  CustomDomainUrl:
    Description: Custom domain URL
    Value: "https://api.openenergy.org.au"
